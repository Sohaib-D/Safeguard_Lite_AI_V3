services:
  # Backend Service (FastAPI)
  - type: web
    name: safeguard-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # Set manually in Render Dashboard to your Supabase URL
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_USERNAME
        value: Sohaib
      - key: ADMIN_PASSWORD
        sync: false

