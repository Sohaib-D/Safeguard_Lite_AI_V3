version: "3.9"

services:
  database:
    image: alpine:3.20
    container_name: safeguard-database
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /data
        touch /data/safeguard_ai.db
        tail -f /dev/null
    volumes:
      - safeguard_data:/data
    healthcheck:
      test: ["CMD", "test", "-f", "/data/safeguard_ai.db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      target: backend
    container_name: safeguard-backend
    depends_on:
      database:
        condition: service_healthy
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      SAFEGUARD_DB_PATH: /app/data/safeguard_ai.db
      BACKEND_LOG_FILE: /app/logs/backend.log
      MODEL_BUNDLE_PATH: /app/models/trained_multiclass_smoke/best_model.pkl
      PREDICTION_CACHE_DIR: /app/models/cache/predictions
      ALLOWED_ORIGINS: http://localhost:8501,http://frontend:8501
      USE_JAX_INFERENCE: "true"
    ports:
      - "8000:8000"
    volumes:
      - safeguard_data:/app/data
      - safeguard_logs:/app/logs
      - safeguard_cache:/app/models/cache/predictions
    cap_add:
      - NET_RAW
      - NET_ADMIN
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      target: frontend
    container_name: safeguard-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      SAFEGUARD_API_BASE_URL: http://backend:8000
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "8501:8501"
    volumes:
      - safeguard_logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  safeguard_data:
  safeguard_logs:
  safeguard_cache:
